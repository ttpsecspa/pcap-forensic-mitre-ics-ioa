name: Feature Request
description: Suggest a new feature or improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement.

  - type: dropdown
    id: category
    attributes:
      label: Category
      description: What type of improvement?
      options:
        - New IOA indicator
        - New industrial protocol support
        - New MITRE ATT&CK technique mapping
        - New APT group correlation
        - Report structure improvement
        - Data preparation enhancement
        - New regulatory framework integration
        - LLM compatibility improvement
        - Translation / Localization
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: Describe the feature or improvement
      placeholder: |
        What would you like to see added or changed?
    validations:
      required: true

  - type: textarea
    id: use-case
    attributes:
      label: Use Case
      description: How would this feature be used in forensic analysis?
      placeholder: |
        In what scenario would this be valuable?
    validations:
      required: true

  - type: textarea
    id: proposed-solution
    attributes:
      label: Proposed Solution
      description: If you have a specific implementation in mind
      placeholder: |
        e.g., "Add IOA-MAN-08 for detection of historian database manipulation with the following indicators..."
    validations:
      required: false

  - type: textarea
    id: references
    attributes:
      label: References
      description: Links to relevant MITRE techniques, standards, or research
    validations:
      required: false

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I have checked the existing issues and this is not a duplicate
          required: true
