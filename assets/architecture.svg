<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" width="900" height="520">
  <defs>
    <linearGradient id="archBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080b12;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f1729;stop-opacity:1" />
    </linearGradient>
    <marker id="arrowRed" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#dc2626" />
    </marker>
    <marker id="arrowBlue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#3b82f6" />
    </marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#059669" />
    </marker>
  </defs>

  <rect width="900" height="520" fill="url(#archBg)" rx="8" />

  <!-- Title -->
  <text x="450" y="35" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="700" fill="#ffffff" text-anchor="middle" letter-spacing="1">
    ARCHITECTURE: PCAP Forensic Analyzer Workflow
  </text>
  <line x1="200" y1="45" x2="700" y2="45" stroke="#dc2626" stroke-width="1" opacity="0.4" />

  <!-- INPUT PHASE -->
  <g>
    <rect x="30" y="70" width="200" height="130" rx="6" fill="#080b12" stroke="#475569" stroke-width="1" />
    <text x="130" y="92" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="600" fill="#94a3b8" text-anchor="middle">INPUT SOURCES</text>

    <rect x="50" y="105" width="160" height="20" rx="3" fill="#1e293b" />
    <text x="130" y="119" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#e2e8f0" text-anchor="middle">PCAP / PCAPNG Files</text>

    <rect x="50" y="130" width="160" height="20" rx="3" fill="#1e293b" />
    <text x="130" y="144" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#e2e8f0" text-anchor="middle">Zeek Logs</text>

    <rect x="50" y="155" width="160" height="20" rx="3" fill="#1e293b" />
    <text x="130" y="169" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#e2e8f0" text-anchor="middle">Suricata / Snort Alerts</text>
  </g>

  <!-- DATA PREPARATION -->
  <g>
    <rect x="30" y="220" width="200" height="105" rx="6" fill="#080b12" stroke="#475569" stroke-width="1" />
    <text x="130" y="242" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="600" fill="#94a3b8" text-anchor="middle">DATA PREPARATION</text>

    <rect x="50" y="255" width="160" height="20" rx="3" fill="#1e293b" />
    <text x="130" y="269" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#e2e8f0" text-anchor="middle">tshark extraction</text>

    <rect x="50" y="280" width="160" height="20" rx="3" fill="#1e293b" />
    <text x="130" y="294" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#e2e8f0" text-anchor="middle">Protocol filtering</text>
  </g>

  <!-- Arrow: Input to Prep -->
  <line x1="130" y1="200" x2="130" y2="218" stroke="#475569" stroke-width="1.5" marker-end="url(#arrowBlue)" />

  <!-- PROMPT ENGINE (center) -->
  <g>
    <rect x="310" y="115" width="280" height="160" rx="8" fill="#080b12" stroke="#dc2626" stroke-width="2" />
    <text x="450" y="140" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" fill="#dc2626" text-anchor="middle">PROMPT ENGINE</text>
    <text x="450" y="158" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">prompt_pcap_mitre_ics_ioa.md</text>

    <line x1="340" y1="168" x2="560" y2="168" stroke="#1e293b" stroke-width="1" />

    <!-- 6 Phases -->
    <g font-family="Segoe UI, Arial, sans-serif" font-size="9" fill="#e2e8f0">
      <rect x="330" y="178" width="120" height="18" rx="3" fill="#1e293b" />
      <text x="390" y="191" text-anchor="middle">Phase 1: Recon</text>

      <rect x="460" y="178" width="120" height="18" rx="3" fill="#1e293b" />
      <text x="520" y="191" text-anchor="middle">Phase 2: Protocols</text>

      <rect x="330" y="202" width="120" height="18" rx="3" fill="#1e293b" />
      <text x="390" y="215" text-anchor="middle">Phase 3: IOA Detection</text>

      <rect x="460" y="202" width="120" height="18" rx="3" fill="#1e293b" />
      <text x="520" y="215" text-anchor="middle">Phase 4: MITRE Map</text>

      <rect x="330" y="226" width="120" height="18" rx="3" fill="#1e293b" />
      <text x="390" y="239" text-anchor="middle">Phase 5: Kill Chain</text>

      <rect x="460" y="226" width="120" height="18" rx="3" fill="#1e293b" />
      <text x="520" y="239" text-anchor="middle">Phase 6: Impact</text>
    </g>

    <!-- LLM badge -->
    <rect x="375" y="252" width="150" height="18" rx="9" fill="#dc2626" opacity="0.15" />
    <text x="450" y="265" font-family="Segoe UI, Arial, sans-serif" font-size="9" fill="#dc2626" text-anchor="middle">Claude / GPT-4 / Gemini</text>
  </g>

  <!-- Arrow: Prep to Prompt -->
  <line x1="230" y1="272" x2="295" y2="210" stroke="#dc2626" stroke-width="1.5" marker-end="url(#arrowRed)" />

  <!-- FRAMEWORKS (right side) -->
  <g>
    <rect x="670" y="70" width="200" height="155" rx="6" fill="#080b12" stroke="#475569" stroke-width="1" />
    <text x="770" y="92" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="600" fill="#94a3b8" text-anchor="middle">FRAMEWORKS</text>

    <rect x="690" y="105" width="160" height="20" rx="3" fill="#dc2626" opacity="0.1" />
    <text x="770" y="119" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#f87171" text-anchor="middle">MITRE ATT&amp;CK ICS v14</text>

    <rect x="690" y="130" width="160" height="20" rx="3" fill="#3b82f6" opacity="0.1" />
    <text x="770" y="144" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#60a5fa" text-anchor="middle">ICS Cyber Kill Chain</text>

    <rect x="690" y="155" width="160" height="20" rx="3" fill="#8b5cf6" opacity="0.1" />
    <text x="770" y="169" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#a78bfa" text-anchor="middle">29 IOA Catalog</text>

    <rect x="690" y="180" width="160" height="20" rx="3" fill="#059669" opacity="0.1" />
    <text x="770" y="194" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#34d399" text-anchor="middle">IEC 62443 / NIST 800-82</text>
  </g>

  <!-- Arrow: Frameworks to Prompt -->
  <line x1="670" y1="195" x2="592" y2="195" stroke="#475569" stroke-width="1.5" marker-end="url(#arrowBlue)" />

  <!-- OUTPUT REPORT -->
  <g>
    <rect x="280" y="330" width="340" height="170" rx="8" fill="#080b12" stroke="#059669" stroke-width="2" />
    <text x="450" y="355" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" fill="#34d399" text-anchor="middle">FORENSIC REPORT (10 Sections)</text>

    <line x1="310" y1="365" x2="590" y2="365" stroke="#1e293b" stroke-width="1" />

    <g font-family="Segoe UI, Arial, sans-serif" font-size="9" fill="#cbd5e1">
      <!-- Left column -->
      <text x="310" y="383">1. Executive Summary</text>
      <text x="310" y="398">2. Scope &amp; Methodology</text>
      <text x="310" y="413">3. Asset Inventory</text>
      <text x="310" y="428">4. Protocol Analysis</text>
      <text x="310" y="443">5. IOA Detected</text>

      <!-- Right column -->
      <text x="470" y="383">6. MITRE ATT&amp;CK Mapping</text>
      <text x="470" y="398">7. Attack Chain</text>
      <text x="470" y="413">8. Impact Evaluation</text>
      <text x="470" y="428">9. Recommendations (P1-P4)</text>
      <text x="470" y="443">10. Technical Appendices</text>
    </g>

    <!-- Compliance badges -->
    <g font-family="Segoe UI, Arial, sans-serif" font-size="8">
      <rect x="310" y="460" width="70" height="16" rx="3" fill="#059669" opacity="0.15" />
      <text x="345" y="472" fill="#34d399" text-anchor="middle">IEC 62443</text>

      <rect x="390" y="460" width="80" height="16" rx="3" fill="#059669" opacity="0.15" />
      <text x="430" y="472" fill="#34d399" text-anchor="middle">NIST 800-82</text>

      <rect x="480" y="460" width="75" height="16" rx="3" fill="#059669" opacity="0.15" />
      <text x="517" y="472" fill="#34d399" text-anchor="middle">Ley 21.663</text>
    </g>
  </g>

  <!-- Arrow: Prompt to Output -->
  <line x1="450" y1="275" x2="450" y2="328" stroke="#059669" stroke-width="1.5" marker-end="url(#arrowGreen)" />

  <!-- Protocols sidebar -->
  <g>
    <rect x="670" y="280" width="200" height="220" rx="6" fill="#080b12" stroke="#475569" stroke-width="1" />
    <text x="770" y="302" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="600" fill="#94a3b8" text-anchor="middle">12+ PROTOCOLS</text>

    <g font-family="Segoe UI, Arial, sans-serif" font-size="9" fill="#94a3b8">
      <text x="700" y="322">Modbus TCP/RTU</text>
      <text x="800" y="322">DNP3</text>
      <text x="700" y="340">OPC-UA</text>
      <text x="800" y="340">EtherNet/IP</text>
      <text x="700" y="358">IEC 61850</text>
      <text x="800" y="358">IEC 104</text>
      <text x="700" y="376">PROFINET</text>
      <text x="800" y="376">BACnet</text>
      <text x="700" y="394">S7comm</text>
      <text x="800" y="394">HART-IP</text>
      <text x="700" y="412">FINS</text>
      <text x="800" y="412">MELSOFT</text>
    </g>

    <line x1="690" y1="428" x2="850" y2="428" stroke="#1e293b" stroke-width="1" />

    <text x="770" y="448" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="600" fill="#94a3b8" text-anchor="middle">5 APT GROUPS</text>
    <g font-family="Segoe UI, Arial, sans-serif" font-size="9" fill="#f87171">
      <text x="700" y="466">ELECTRUM</text>
      <text x="800" y="466">XENOTIME</text>
      <text x="700" y="482">CHERNOVITE</text>
      <text x="800" y="482">SANDWORM</text>
      <text x="750" y="498" text-anchor="middle">KAMACITE</text>
    </g>
  </g>
</svg>
